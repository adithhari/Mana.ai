<div class="manali-panel">
  <div class="title">Mana AI</div>
  <div class="content">
    <div class="mana-main">
      <div class="transcript-container">
        <span class="section-title">Live Meeting Summary</span>
        <textarea readonly placeholder="Meeting summary will appear here..."></textarea>
      </div>
      <div class="agent-container">
        <span class="section-title">Ask questions about the meeting</span>
        <div class="agent-conversation"></div>
        <div class="agent-input-container">
          <input type="text" placeholder="Ask Mana AI" id="aiQuestion" />
        </div>
      </div>
    </div>
  </div>
</div>
